services:
  postgres:
    image: postgres:16-alpine
    container_name: mangodefend-apps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mangodefend_app}
      POSTGRES_USER: ${POSTGRES_USER:-mangodefend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mangodefend} -d ${POSTGRES_DB:-mangodefend_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

